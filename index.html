<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PortiPel SAS</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

.sidebar {
  width: 260px;
  background: #0b2c5f;
  color: white;
  height: 100vh;
  position: fixed;
  padding: 20px;
}

.sidebar img {
  width: 160px;
  margin-bottom: 20px;
}

.btn {
  background: #ffc107;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}

.main {
  margin-left: 280px;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

.title {
  color: #0b2c5f;
}
</style>
</head>

<body>

<div class="sidebar">
  <img src="LOGO.png" />

  <h3>Iniciar sesión</h3>
  <input placeholder="Usuario"><br><br>
  <input placeholder="Contraseña" type="password"><br><br>
  <button class="btn">Ingresar</button>

  <hr>

  <p><b>admin</b><br>admin123</p>
  <p><b>usuario</b><br>usuario123</p>
</div>

<div class="main">
  <h1 class="title">PortiPel SAS - Listas de Precios</h1>

  <div class="card">
    <h2>Lista cliente</h2>
    Cliente: General
  </div>

  <div class="card">
    <h2>PortiPel SAS</h2>
    <p>Precios en USD sin IVA</p>

    <table width="100%">
      <tr>
        <th>Código</th>
        <th>Producto</th>
        <th>Formato</th>
        <th>Gramaje</th>
        <th>Hojas</th>
        <th>Precio</th>
      </tr>

      <tr>
        <td>OBR-001</td>
        <td>Papel Obra Color</td>
        <td>72x92</td>
        <td>300 g</td>
        <td>100</td>
        <td><b>$36.96</b></td>
      </tr>
    </table>
  </div>
</div>

</body>
</html>
